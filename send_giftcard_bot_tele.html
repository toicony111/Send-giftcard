<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi Clipboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 160px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h2>📋 Gửi Clipboard</h2>
    <p>Copy nội dung → bấm nút bên dưới</p>
    <textarea id="text" placeholder="Nếu không tự dán được, hãy dán thủ công vào đây"></textarea>
    <button onclick="pasteAndSend()">📤 Dán & Gửi</button>

    <script>
        const BOT_TOKEN = "8379215075:AAHfjpWkGkmXJoiya1mVJH8Nd1wCgXTtPs4";
        const CHAT_ID = "5376711844";

        async function pasteAndSend() {
            let text = document.getElementById("text").value.trim();

            // Nếu textarea trống thì đọc clipboard
            if (!text) {
                try {
                    text = await navigator.clipboard.readText();
                    document.getElementById("text").value = text;
                } catch (e) {
                    // Không hiện popup
                    return;
                }
            }

            if (!text) return;

            // Gửi âm thầm, không alert
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text
                })
            }).catch(() => {});
        }
    </script>
</body>
</html>
